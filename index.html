<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mijn Test Website</title>
  <style>
    body {
      font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }
    p {
      color: #94a3b8;
      max-width: 400px;
    }
    .badge {
      margin-top: 1.5rem;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      background: #1e293b;
      font-size: 0.85rem;
      color: #38bdf8;
    }
    #clock {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <h1>🚀 Het werkt!</h1>
  <p>Dit is mijn eerste testwebsite, gehost via Render en draaiend dankzij Node.js + Express.</p>
  <div class="badge">Live & online</div>
  <div id="clock"></div>

  <script>
    function updateClock() {
      document.getElementById('clock').textContent =
        'Servertijd (jouw browser): ' + new Date().toLocaleString('nl-NL');
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
